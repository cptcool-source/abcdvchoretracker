<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meal Planner — Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/meals.css">
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <i class="ph-duotone ph-duotone-circles-three-plus nav-logo-icon" aria-hidden="true"></i>
      <span class="nav-logo-text">Family Hub</span>
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Home</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
      <a href="memories.html" class="nav-link">Memories</a>
      <a href="maxi.html" class="nav-link">Ask mAxI</a>
      <a href="fun.html" class="nav-link">Fun Zone</a>
      <a href="study.html" class="nav-link">Study Zone</a>
      <a href="chores.html" class="nav-link">Chores</a>
    </nav>
  </div>
</header>

<div id="auth-loading" class="loading-state">Loading Meal Planner</div>

<div id="passcode-gate" class="gate-overlay" hidden>
  <div class="gate-card surface">
    <i class="ph-duotone ph-duotone-fork-knife gate-emoji" aria-hidden="true"></i>
    <h2 class="gate-title">Meal Planner</h2>
    <p class="gate-sub">Enter the family passcode</p>
    <div class="gate-inputs" id="gate-inputs">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" autocomplete="off">
    </div>
    <p class="gate-error" id="gate-error" hidden>Wrong code — try again</p>
    <button class="btn btn-primary" id="gate-submit">Unlock</button>
  </div>
</div>

<main id="meals-root" hidden>
  <div class="meals-page">

    <!-- ── Shopping List ── -->
    <section class="list-section">
      <div class="list-section-header">
        <h2 class="list-heading">Shopping List</h2>
        <button class="btn-add" id="show-add-item-btn" touch-action="manipulation">
          <i class="ph-duotone ph-duotone-plus" aria-hidden="true"></i> Add Item
        </button>
      </div>
      <div class="add-item-form" id="add-item-form" hidden>
        <input type="text" id="new-item-input" class="list-input" placeholder="Item name…" autocomplete="off">
        <div class="form-actions">
          <button class="btn-save" id="save-item-btn">Add</button>
          <button class="btn-cancel" id="cancel-item-btn">Cancel</button>
        </div>
      </div>
      <ul class="items-list" id="items-list">
        <li class="list-empty" id="items-empty">No items yet</li>
      </ul>
    </section>

    <!-- ── Recipes ── -->
    <section class="list-section">
      <div class="list-section-header">
        <h2 class="list-heading">Recipes</h2>
        <button class="btn-add" id="show-add-recipe-btn">
          <i class="ph-duotone ph-duotone-plus" aria-hidden="true"></i> Add Recipe
        </button>
      </div>
      <div class="add-recipe-form" id="add-recipe-form" hidden>
        <input type="text" id="recipe-name-input" class="list-input" placeholder="Recipe name…" autocomplete="off">
        <textarea id="recipe-content-input" class="recipe-textarea" placeholder="Paste recipe or list ingredients…" rows="6"></textarea>
        <div class="form-actions">
          <button class="btn-save" id="save-recipe-btn">Save Recipe</button>
          <button class="btn-cancel" id="cancel-recipe-btn">Cancel</button>
        </div>
      </div>
      <div class="recipes-list" id="recipes-list">
        <div class="list-empty" id="recipes-empty">No recipes yet</div>
      </div>
    </section>

  </div>
</main>

<footer class="site-footer" id="site-footer" hidden>
  <span class="footer-text">Family Hub · 2026</span>
  <button class="footer-link-btn" id="lock-btn">
    <i class="ph-duotone ph-duotone-lock-simple" aria-hidden="true"></i> Lock this device
  </button>
</footer>

<script type="module" src="js/meals.js"></script>
</body>
</html>
