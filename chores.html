<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chore Squad — Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/chores.css">
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">✨ Family Hub</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="chores.html">Chores</a>
    </nav>
  </div>
</header>

<div id="auth-loading" class="loading-state">Checking your passcode… ✨</div>

<div id="passcode-gate" class="gate-overlay" hidden>
  <div class="gate-card surface">
    <span class="gate-emoji">🔒</span>
    <h2 class="gate-title">Family Passcode</h2>
    <p class="gate-sub">Enter the 4-digit code to unlock Chore Squad</p>
    <div class="gate-inputs" id="gate-inputs">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="0" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="1" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="2" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="3" autocomplete="off">
    </div>
    <p class="gate-error" id="gate-error" hidden>😬 Wrong code — try again!</p>
    <button class="btn btn-primary" id="gate-submit">Unlock ✨</button>
  </div>
</div>

<main id="chore-app-root" hidden>
  <div id="root">
    <div id="app"><div class="loading-state">Loading your chores… ✨</div></div>
  </div>
</main>

<footer class="site-footer" id="site-footer" hidden>
  Made with 💖 for our family · <button class="footer-link-btn" id="lock-device-btn">🔒 Lock this device</button>
</footer>

<script type="module" src="js/chores.js"></script>
</body>
</html>
