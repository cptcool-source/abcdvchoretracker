<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chore Squad — Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/chores.css">
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <i class="ph-duotone ph-duotone-circles-three-plus nav-logo-icon" aria-hidden="true"></i>
      <span class="nav-logo-text">Family Hub</span>
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Home</a>
      <a href="chores.html" class="nav-link active" aria-current="page">Chores</a>
      <a href="memories.html" class="nav-link">Memories</a>
      <a href="study.html" class="nav-link">Study Zone</a>
      <a href="maxi.html" class="nav-link">Ask mAxI</a>
    </nav>
  </div>
</header>

<div id="auth-loading" class="loading-state">Loading Chore Squad</div>

<div id="passcode-gate" class="gate-overlay" hidden>
  <div class="gate-card surface">
    <i class="ph-duotone ph-duotone-sparkle gate-emoji" aria-hidden="true"></i>
    <h2 class="gate-title">Chore Squad</h2>
    <p class="gate-sub">Enter the family passcode to unlock</p>
    <div class="gate-inputs" id="gate-inputs">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="0" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="1" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="2" autocomplete="off">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="gate-digit" data-idx="3" autocomplete="off">
    </div>
    <p class="gate-error" id="gate-error" hidden>Wrong code — try again</p>
    <button class="btn btn-primary" id="gate-submit">Unlock</button>
  </div>
</div>

<main id="chore-app-root" hidden>
  <div id="root">
    <div id="app"><div class="loading-state">Loading Chore Squad</div></div>
  </div>
</main>

<footer class="site-footer" id="site-footer" hidden>
  <span class="footer-text">Family Hub · 2026</span>
  <button class="footer-link-btn" id="lock-device-btn">
    <i class="ph-duotone ph-duotone-lock-simple" aria-hidden="true"></i> Lock this device
  </button>
</footer>

<script type="module" src="js/chores.js"></script>
</body>
</html>
